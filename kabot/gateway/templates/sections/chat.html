<section id="sec-chat" class="tab-section">
    <div class="config-section-hero">
        <div>
            <div class="config-section-hero__eyebrow">Primary Session</div>
            <h2 class="config-section-hero__title">Interactive Chat</h2>
            <p class="config-section-hero__desc">Send prompts directly to the active gateway session from this control surface.</p>
        </div>
        <div class="config-section-hero__meta">Built for fast operator loops, not just static monitoring.</div>
    </div>
    <div id="panel-chat" class="config-section-card config-section-card--chat"
        hx-get="/dashboard/partials/chat__TOKEN_SUFFIX__" hx-trigger="load" hx-swap="innerHTML">
        <div style="padding:22px; color:var(--muted); font-size:13px;">Loading chat...</div>
    </div>
</section>
